name: Release

on:
  push:
    tags:
      - "v*"

# dev リポ側は読み取りのみ。公開リポへの書き込みは PUBLIC_REPO_TOKEN が担う
permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: ci
    runs-on: ubuntu-latest
    env:
      PUBLIC_REPO: ToshikiImagawa/ai-sdd-workflow
      GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check version consistency
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ERRORS=()

          # 1. marketplace.json metadata.version
          MARKET_VER=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          if [ "$MARKET_VER" != "$VERSION" ]; then
            ERRORS+=("marketplace.json metadata.version: expected $VERSION, got $MARKET_VER")
          fi

          # 2. marketplace.json plugins[].version (all entries)
          PLUGIN_VERS=$(jq -r '.plugins[].version' .claude-plugin/marketplace.json)
          INDEX=0
          while IFS= read -r ver; do
            if [ "$ver" != "$VERSION" ]; then
              ERRORS+=("marketplace.json plugins[$INDEX].version: expected $VERSION, got $ver")
            fi
            INDEX=$((INDEX + 1))
          done <<< "$PLUGIN_VERS"

          # 3. sdd-workflow plugin.json
          SDD_VER=$(jq -r '.version' plugins/sdd-workflow/.claude-plugin/plugin.json)
          if [ "$SDD_VER" != "$VERSION" ]; then
            ERRORS+=("sdd-workflow plugin.json version: expected $VERSION, got $SDD_VER")
          fi

          if [ ${#ERRORS[@]} -gt 0 ]; then
            echo "::error::Version mismatch detected between tag v$VERSION and manifest files:"
            for err in "${ERRORS[@]}"; do
              echo "  - $err"
            done
            exit 1
          fi

          echo "All version checks passed: $VERSION"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG="plugins/sdd-workflow/CHANGELOG.md"

          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") found=1
              next
            }
            found { print }
          ' "$CHANGELOG" > /tmp/release-notes.md

          if [ ! -s /tmp/release-notes.md ]; then
            echo "::error::No CHANGELOG entry found for version $VERSION in $CHANGELOG"
            exit 1
          fi

      - name: Determine prerelease
        id: prerelease
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == *-* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone public repo
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${PUBLIC_REPO}.git" public

      - name: Sync distribution files
        run: |
          # plugins/ を丸ごと同期（--delete で公開リポの旧 sdd-workflow-ja 等を除去）
          rsync -a --delete \
            --exclude '__pycache__' \
            --exclude '*.pyc' \
            plugins/ public/plugins/
          cp -f .claude-plugin/marketplace.json public/.claude-plugin/marketplace.json
          cp -f LICENSE public/LICENSE
          cp -f dist/README.md public/README.md

      - name: Commit and push distribution to public repo
        working-directory: public
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No file changes to mirror."
          else
            git commit -m "[release] sync distribution from ai-sdd-workflow-dev@${GITHUB_SHA::7} (${GITHUB_REF_NAME})"
            git push
          fi

      - name: Tag public repo
        working-directory: public
        run: |
          git tag "$GITHUB_REF_NAME"
          git push origin "$GITHUB_REF_NAME"

      - name: Create GitHub Release on public repo
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$PUBLIC_REPO" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md \
            ${{ steps.prerelease.outputs.flag }}
